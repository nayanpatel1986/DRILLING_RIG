[agent]
  interval = "500ms"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "500ms"
  flush_jitter = "0s"
  precision = ""
  hostname = "modbus"
  omit_hostname = false

[[inputs.internal]]
  collect_memstats = true

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "my-super-secret-auth-token"
  organization = "nov_rig"
  bucket = "rig_data"

# ── DAQ-10 (daq10) ──
[[inputs.modbus]]
  name = "rig_sensors"
  slave_id = 1
  timeout = "1s"
  name_override = "modbus"
  configuration_type = "register"
  controller = "tcp://10.1.0.191:502"

  holding_registers = [
    { name = "WOH", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 0.453592, address = [1018, 1019] },
    { name = "WOB", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 0.453592, address = [1102, 1103] },
    { name = "PUMP 1", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [1108, 1109] },
    { name = " PUMP 2", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [1112, 1113] },
