    { name = "STROKES 2", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [1114, 1115] },
    { name = "STANDPIPE  PRESSURE", byte_order = "CDAB", data_type = "FLOAT32-IEEE", scale = 1.0, address = [1004, 1005] },
